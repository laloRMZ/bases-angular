<p-toast></p-toast>

<div style="max-width: 400px; margin: 60px auto;">
  <h2>Registro</h2>

  <form (ngSubmit)="register()">

    <input placeholder="Usuario"
           [(ngModel)]="usuario"
           name="usuario"
           required />
    <br /><br />

    <input placeholder="Email"
           type="email"
           [(ngModel)]="email"
           name="email"
           required />
    <br /><br />

    <input type="password"
           placeholder="Contraseña"
           [(ngModel)]="password"
           name="password"
           required />
    <br /><br />

    <input type="password"
           placeholder="Confirmar Contraseña"
           [(ngModel)]="confirmPassword"
           name="confirmPassword"
           required />
    <br /><br />

    <input placeholder="Nombre Completo"
           [(ngModel)]="nombreCompleto"
           name="nombreCompleto"
           required />
    <br /><br />

    <input placeholder="Dirección"
           [(ngModel)]="direccion"
           name="direccion"
           required />
    <br /><br />

    <input type="number"
           placeholder="Edad"
           [(ngModel)]="edad"
           name="edad"
           required />
    <br /><br />

    <input placeholder="Teléfono"
           [(ngModel)]="telefono"
           name="telefono"
           required />
    <br /><br />

    <button pButton
            type="submit"
            label="Crear cuenta"
            severity="success"
            style="width: 100%;">
    </button>

  </form>
</div>
