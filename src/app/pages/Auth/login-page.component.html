<p-toast></p-toast>

<div class="login-container">

  <div class="login-card">

    <h2 class="title">Bienvenido</h2>
    <p class="subtitle">Inicia sesión para continuar</p>

    <form (ngSubmit)="login()">

      <div class="field">
        <label>Email</label>
        <span class="p-input-icon-left w-100">
          <i class="pi pi-envelope"></i>
          <input 
            pInputText
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Ingrese su correo"
            required />
        </span>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <span class="p-input-icon-left w-100">
          <i class="pi pi-lock"></i>
          <input 
            pInputText
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required />
        </span>
      </div>

      <button 
        pButton
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        class="login-btn">
      </button>

    </form>

  </div>

</div>
