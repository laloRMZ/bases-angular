<p-toast></p-toast>

<div class="login-container">

  <div class="login-card">

    <h2 class="title">Bienvenido</h2>
    <p class="subtitle">Inicia sesión para continuar</p>

    <form (ngSubmit)="login()">

      <!-- EMAIL -->
      <div class="field">
        <label>Email</label>

        <p-inputgroup>

          <p-inputgroup-addon>
            <i class="pi pi-envelope"></i>
          </p-inputgroup-addon>

          <input
            pInputText
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Ingrese su correo"
            required />

        </p-inputgroup>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label>Contraseña</label>

        <p-inputgroup>

          <p-inputgroup-addon>
            <i class="pi pi-lock"></i>
          </p-inputgroup-addon>

          <input
            pInputText
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required />

        </p-inputgroup>
      </div>

      <button
        pButton
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        class="login-btn">
      </button>

    </form>

  </div>

</div>
