<!-- 🔹 HEADER -->
<p-card class="mb-3">
  <button pButton
          label="Regresar al Home"
          icon="pi pi-home"
          class="p-button-secondary"
          (click)="goHome()">
  </button>
</p-card>

<p-card class="mb-4 shadow-2">
  <div class="flex justify-content-between align-items-center">

    <div class="flex align-items-center gap-2">
      <i class="pi pi-users text-2xl text-primary"></i>
      <span class="text-xl font-bold">
        Gestión de Usuarios
      </span>
    </div>

    <button pButton
            label="Nuevo Usuario"
            icon="pi pi-plus"
            class="p-button-success"
            (click)="openCreateUser()">
    </button>

  </div>
</p-card>

<!-- 🔹 TABLA -->
<p-card>

  <p-table [value]="users">

    <ng-template pTemplate="header">
      <tr>
        <th>Email</th>
        <th>Permisos</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.email }}</td>

        <td>
          <p-tag *ngFor="let perm of user.permissions"
                 [value]="formatPermission(perm)"
                 class="mr-1 mb-1">
          </p-tag>
        </td>

        <td class="flex gap-5">

          <button pButton
                  icon="pi pi-pencil"
                  class="p-button-sm p-button-warning"
                  (click)="editUser(user)">
          </button>

          <button pButton
                  icon="pi pi-cog"
                  class="p-button-sm p-button-info"
                  (click)="openPermissions(user)">
          </button>

          <button pButton
                  icon="pi pi-trash"
                  class="p-button-sm p-button-danger"
                  (click)="deleteUser(user)">
          </button>

        </td>
      </tr>
    </ng-template>

  </p-table>

</p-card>

<!-- 🔐 MODAL PERMISOS -->
<p-dialog header="Asignar Permisos"
          [(visible)]="displayModal"
          [modal]="true"
          [style]="{ width: '600px' }">

  <div *ngIf="selectedUser">

    <p><b>{{ selectedUser.email }}</b></p>

    <div *ngFor="let group of ['USERS','GROUPS','TICKETS']">

      <h4 class="mt-3">{{ group }}</h4>

      <div *ngFor="let permission of groupedPermissions[group]"
           class="flex align-items-center mb-2">

        <p-checkbox
          [binary]="true"
          [ngModel]="hasPermission(permission)"
          (onChange)="togglePermission(permission)">
        </p-checkbox>

        <label class="ml-2">
          {{ formatPermission(permission) }}
        </label>

      </div>

    </div>

  </div>

  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" (click)="displayModal=false"></button>
    <button pButton label="Guardar" class="p-button-success" (click)="savePermissions()"></button>
  </ng-template>

</p-dialog>

<!-- 👤 MODAL USUARIO -->
<p-dialog [header]="isEditMode ? 'Editar Usuario' : 'Nuevo Usuario'"
          [(visible)]="displayUserModal"
          [modal]="true"
          [style]="{ width: '400px' }">

  <div class="field">
    <label>Email</label>
    <input type="text"
           pInputText
           [(ngModel)]="newUser.email"
           class="w-full">
  </div>

  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" (click)="displayUserModal=false"></button>
    <button pButton label="Guardar" class="p-button-success" (click)="saveUser()"></button>
  </ng-template>

</p-dialog>
