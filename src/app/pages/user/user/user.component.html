<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-toolbar styleClass="mb-4">

  <ng-template pTemplate="start">
    <h2>Gestión de Usuarios</h2>
  </ng-template>

  <ng-template pTemplate="end">

    <button
      pButton
      label="Nuevo"
      icon="pi pi-plus"
      *ifHasPermission="['users:xd']"
      (click)="openNew()">
    </button>

  </ng-template>

</p-toolbar>

<p-table
  [value]="users"
  responsiveLayout="scroll"
  styleClass="p-datatable-striped p-datatable-sm">

  <ng-template pTemplate="header">
    <tr>
      <th>Nombre</th>
      <th>Correo</th>
      <th>Rol</th>
      <th style="width:120px">Acciones</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-user>
    <tr>

      <td>{{ user.nombre }}</td>
      <td>{{ user.correo }}</td>
      <td>{{ user.rol }}</td>

      <td>

        <button
          pButton
          icon="pi pi-pencil"
          class="p-button-rounded p-button-text"
          *ifHasPermission="['users:edit']"
          (click)="editUser(user)">
        </button>

        <button
          pButton
          icon="pi pi-trash"
          class="p-button-rounded p-button-text p-button-danger"
          *ifHasPermission="['users:delete']"
          (click)="deleteUser(user)">
        </button>

      </td>

    </tr>
  </ng-template>

</p-table>
