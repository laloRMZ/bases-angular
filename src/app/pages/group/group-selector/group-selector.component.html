<div class="group-container">

  <h2>Select your workspace</h2>

  <div class="group-grid">

    <div class="group-card" *ngFor="let group of groups">

      <h3>{{group.name}}</h3>

      <p>{{group.description}}</p>

      <button
        class="enter-btn"
        (click)="selectGroup(group)">
        Enter
      </button>

    </div>

  </div>

</div>
